<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shift Report Breakdown</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="top-bar">
    <h1>Shift report</h1>
    
    <div class="control-group">
      <label for="csvFileInput">Sales:</label>
      <input type="file" id="csvFileInput" accept=".csv" />
    </div>

    <div class="control-group">
      <label for="paymentsCsvInput">Payments:</label>
      <input type="file" id="paymentsCsvInput" accept=".csv" />
    </div>

    <div class="control-group">
      <label for="staffFilter">Staff:</label>
      <select id="staffFilter" disabled>
        <option value="">All Staff</option>
      </select>
    </div>

    <button id="clearCsv">Clear Data</button>
    <button id="toggleTheme">Theme</button>
  </div>

  <div id="salesSection" class="table-section" style="display: none;">
    <h2 class="main-table-title">Sales</h2>
    <h2>Total Sales after Voids and Comp<span id="ownPlusVoidsTotal" class="table-total"></span></h2>
    <div class="table-container">
      <table id="csvTableCombined"></table>
    </div>
    <button class="export-btn" onclick="exportTableToCSV('csvTableCombined','sales_breakdown.csv')">Export Sales CSV</button>
  </div>

  <div id="paymentsSection" class="table-section" style="display: none;">
    <h2 class="main-table-title">Payments</h2>
    <div class="table-container">
      <table id="csvTablePayments"></table>
    </div>
    <button class="export-btn" onclick="exportTableToCSV('csvTablePayments','payments_breakdown.csv')">Export Payments CSV</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
